spring.application.name=SpringRestCrudWithDatabase
server.port=8090

# --- MySQL datasource ---
spring.datasource.url=jdbc:mysql://localhost:3306/layered_demo?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (Hikari) -- sensible defaults
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# --- SQL init (seed data.sql) ---
spring.sql.init.mode=always

# Swagger (springdoc)
springdoc.swagger-ui.path=/swagger-ui.html

# Logging (reduce Tomcat HTTPS-on-HTTP noise if any)
logging.level.org.apache.coyote.http11.Http11Processor=WARN

# Actuator (optional)
management.endpoints.web.exposure.include=health,info